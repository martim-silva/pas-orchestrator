---

- name: Resolve Win11 prerequisite artifact URL from environment
  ansible.builtin.set_fact:
    pvwa_win11_prereq_zip_url: >-
      {{
        (
          (lookup('env', 'NEXUS_BASE_URL') | default('http://nexus.localhost/repository/mhs-software', true))
          | regex_replace('/+$', '')
        )
        ~ '/'
        ~
        (
          lookup('env', 'NEXUS_PVWA_WIN11_PREREQ_ARTIFACT')
          | default('cyberark/PVWA_Prerequisites_Win11.zip', true)
          | regex_replace('^/+', '')
        )
      }}

- name: Resolve optional Nexus credentials for Win11 prerequisite download
  ansible.builtin.set_fact:
    pvwa_win11_prereq_nexus_username: "{{ lookup('env', 'NEXUS_USERNAME') | default('', true) }}"
    pvwa_win11_prereq_nexus_password: "{{ lookup('env', 'NEXUS_PASSWORD') | default('', true) }}"

- name: Ensure CyberArk package workspace exists
  ansible.windows.win_file:
    path: C:\Cyberark\packages
    state: directory

- name: Check whether Win11 prerequisite ZIP was already staged on host
  ansible.windows.win_stat:
    path: C:\tmp\pas_packages\PVWA_Prerequisites_Win11.zip
  register: pvwa_win11_prereq_staged_zip

- name: Reuse staged PVWA Win11 prerequisites bundle
  ansible.windows.win_copy:
    src: C:\tmp\pas_packages\PVWA_Prerequisites_Win11.zip
    dest: C:\Cyberark\packages\PVWA_Prerequisites_Win11.zip
    remote_src: true
    force: true
  when: pvwa_win11_prereq_staged_zip.stat.exists | default(false)

- name: Download PVWA Win11 prerequisites bundle from Nexus when not already staged
  ansible.windows.win_get_url:
    url: "{{ pvwa_win11_prereq_zip_url }}"
    dest: C:\Cyberark\packages\PVWA_Prerequisites_Win11.zip
    force: true
    url_username: "{{ pvwa_win11_prereq_nexus_username if (pvwa_win11_prereq_nexus_username | length > 0) else omit }}"
    url_password: "{{ pvwa_win11_prereq_nexus_password if (pvwa_win11_prereq_nexus_password | length > 0) else omit }}"
  when: not (pvwa_win11_prereq_staged_zip.stat.exists | default(false))

- name: Reset extracted Win11 prerequisites folder before unzip
  ansible.windows.win_file:
    path: C:\Cyberark\packages\PVWA_Prerequisites_Win11
    state: absent

- name: Extract PVWA Win11 prerequisites bundle
  community.windows.win_unzip:
    src: C:\Cyberark\packages\PVWA_Prerequisites_Win11.zip
    dest: C:\Cyberark\packages\PVWA_Prerequisites_Win11

- name: Locate RunPVWAPrerequisites.ps1 inside extracted bundle
  ansible.windows.win_shell: |
    $runner = Get-ChildItem -Path 'C:\Cyberark\packages\PVWA_Prerequisites_Win11' -Filter 'RunPVWAPrerequisites.ps1' -Recurse -File | Select-Object -First 1
    if (-not $runner) {
      Write-Error 'RunPVWAPrerequisites.ps1 was not found in PVWA_Prerequisites_Win11.zip'
      exit 1
    }
    Write-Output $runner.FullName
  args:
    executable: powershell
  register: pvwa_win11_prereq_runner
  changed_when: false

- name: Pre-enable IIS features for Win11 before vendor prerequisite execution
  ansible.builtin.include_tasks: enable_iis.yml

- name: Install bundled VC++ redistributables from Win11 prerequisite bundle
  ansible.windows.win_shell: |
    $runnerPath = "{{ pvwa_win11_prereq_runner.stdout | trim }}"

    if ([string]::IsNullOrWhiteSpace($runnerPath)) {
      Write-Error 'Resolved prerequisite runner path is empty'
      exit 1
    }

    $runnerDir = Split-Path -Parent $runnerPath
    $installers = @(
      Join-Path $runnerDir 'vcredist_x86.exe'
      Join-Path $runnerDir 'vcredist_x64.exe'
    )

    $allowedExitCodes = @(0, 1638, 3010)
    foreach ($installer in $installers) {
      if (-not (Test-Path $installer)) {
        Write-Host "VC++ installer not found in bundle: $installer"
        continue
      }

      Write-Host "Running $installer /quiet /norestart"
      $p = Start-Process -FilePath $installer -ArgumentList '/quiet', '/norestart' -Wait -PassThru
      if ($allowedExitCodes -notcontains $p.ExitCode) {
        Write-Error "Installer failed: $installer exited with code $($p.ExitCode)"
        exit $p.ExitCode
      }
    }

    exit 0
  args:
    executable: powershell

- name: Disable known-problematic steps in bundled Win11 prerequisite config
  ansible.windows.win_shell: |
    $runnerPath = "{{ pvwa_win11_prereq_runner.stdout | trim }}"

    if ([string]::IsNullOrWhiteSpace($runnerPath)) {
      Write-Error 'Resolved prerequisite runner path is empty'
      exit 1
    }

    $runnerDir = Split-Path -Parent $runnerPath
    $configPath = Join-Path $runnerDir 'PVWA_Prerequisites_Config.xml'
    if (-not (Test-Path $configPath)) {
      Write-Error "Configuration file not found: $configPath"
      exit 1
    }

    [xml]$xml = Get-Content -Path $configPath
    $disableSteps = @('PVWA_Install_Redistributable', 'PVWA_InstallWebServerRoles')
    foreach ($step in $xml.Stage.Step) {
      if ($disableSteps -contains [string]$step.Name) {
        $step.Enable = 'No'
      }
    }
    $xml.Save($configPath)
    Write-Host "Patched prerequisite config at $configPath"
  args:
    executable: powershell

- name: Patch extracted Win11 IIS verification module helper name typo
  ansible.windows.win_shell: |
    $runnerPath = "{{ pvwa_win11_prereq_runner.stdout | trim }}"

    if ([string]::IsNullOrWhiteSpace($runnerPath)) {
      Write-Error 'Resolved prerequisite runner path is empty'
      exit 1
    }

    $runnerDir = Split-Path -Parent $runnerPath
    $verifyModule = Get-ChildItem -Path $runnerDir -Filter 'PVWA_Verify_IIS_Settings.psm1' -Recurse -File | Select-Object -First 1
    if (-not $verifyModule) {
      Write-Host 'PVWA_Verify_IIS_Settings.psm1 not found in extracted bundle'
      exit 0
    }

    $content = Get-Content -Path $verifyModule.FullName -Raw
    $updated = $content -replace 'GetRegistryValue', 'GetRegisrtyValue'
    if ($updated -ne $content) {
      Set-Content -Path $verifyModule.FullName -Value $updated -Encoding UTF8
    }
  args:
    executable: powershell

- name: Execute vendor Win11 PVWA prerequisites script
  ansible.windows.win_shell: |
    $runnerPath = "{{ pvwa_win11_prereq_runner.stdout | trim }}"

    if ([string]::IsNullOrWhiteSpace($runnerPath)) {
      Write-Error 'Resolved prerequisite runner path is empty'
      exit 1
    }

    $runnerDir = Split-Path -Parent $runnerPath

    Push-Location $runnerDir
    try {
      # Match the common manual invocation pattern and also pass Bypass on the
      # child PowerShell process so the vendor script can run without policy prompts.
      Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
      $rawResult = & powershell.exe -NoProfile -ExecutionPolicy Bypass -File $runnerPath

      if ($LASTEXITCODE -ne 0) {
        Write-Error "RunPVWAPrerequisites.ps1 exited with code $LASTEXITCODE"
        exit $LASTEXITCODE
      }

      if ($rawResult) {
        try {
          $resultObject = $rawResult | ConvertFrom-Json -ErrorAction Stop
          if ($resultObject.PSObject.Properties.Name -contains 'isSucceeded' -and [int]$resultObject.isSucceeded -ne 0) {
            $errorData = ''
            if ($resultObject.PSObject.Properties.Name -contains 'errorData') {
              $errorData = $resultObject.errorData
            }
            Write-Error "RunPVWAPrerequisites.ps1 reported failure (isSucceeded=$($resultObject.isSucceeded)). $errorData"
            exit 1
          }
        }
        catch {
          Write-Host 'Prerequisites script output was not JSON; continuing based on exit code.'
        }
      }
    }
    finally {
      Pop-Location
    }
  args:
    executable: powershell
  register: pvwa_win11_prereq_exec_result
  changed_when: false

- name: Report Win11 PVWA prerequisite script execution
  ansible.builtin.debug:
    msg:
      - "RunPVWAPrerequisites.ps1 executed from: {{ pvwa_win11_prereq_runner.stdout | trim }}"
      - "Exit code: {{ pvwa_win11_prereq_exec_result.rc }}"
      - "Stdout: {{ pvwa_win11_prereq_exec_result.stdout | default('') | trim }}"
      - "Stderr: {{ pvwa_win11_prereq_exec_result.stderr | default('') | trim }}"


